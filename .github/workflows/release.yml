name: Release

on:
  workflow_dispatch:

env:
  APP_NAME: sendentsynchroniser
  NEXTCLOUD_SERVER_MAJOR: '30'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          path: ${{ env.APP_NAME }}

      - name: Read version from info.xml
        id: version
        working-directory: ${{ env.APP_NAME }}
        run: |
          VERSION=$(grep -oP '<version>\K[^<]+' appinfo/info.xml)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read <version> from appinfo/info.xml"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=Release-${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${VERSION}"

      - name: Ensure this version is not already released
        working-directory: ${{ env.APP_NAME }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::${{ steps.version.outputs.tag }} already exists. Bump <version> in appinfo/info.xml before releasing."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_NAME }}/package-lock.json

      - name: Install npm dependencies
        working-directory: ${{ env.APP_NAME }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.APP_NAME }}
        run: npm run build

      - name: Clean build artifacts
        working-directory: ${{ env.APP_NAME }}
        run: |
          find js/ -name '*.map' -delete
          find js/ -name '*.LICENSE.txt' -delete
          find css/ -name '*.map' -delete 2>/dev/null || true

      - name: Stage clean app package
        run: |
          tar czf clean.tar.gz \
            --exclude="./${APP_NAME}/.git" \
            --exclude="./${APP_NAME}/.github" \
            --exclude="./${APP_NAME}/.gitignore" \
            --exclude="./${APP_NAME}/.gitattributes" \
            --exclude="./${APP_NAME}/.yarnrc" \
            --exclude="./${APP_NAME}/.eslintrc.*" \
            --exclude="./${APP_NAME}/.php_cs*" \
            --exclude="./${APP_NAME}/.php-cs-fixer.dist.php" \
            --exclude="./${APP_NAME}/.phpunit.result.cache" \
            --exclude="./${APP_NAME}/.env" \
            --exclude="./${APP_NAME}/.vscode" \
            --exclude="./${APP_NAME}/.vs" \
            --exclude="./${APP_NAME}/.DS_Store" \
            --exclude="./${APP_NAME}/.claude" \
            --exclude="./${APP_NAME}/node_modules" \
            --exclude="./${APP_NAME}/vendor" \
            --exclude="./${APP_NAME}/src" \
            --exclude="./${APP_NAME}/tests" \
            --exclude="./${APP_NAME}/build" \
            --exclude="./${APP_NAME}/releases" \
            --exclude="./${APP_NAME}/certificates" \
            --exclude="./${APP_NAME}/Postman" \
            --exclude="./${APP_NAME}/package.json" \
            --exclude="./${APP_NAME}/package-lock.json" \
            --exclude="./${APP_NAME}/composer.json" \
            --exclude="./${APP_NAME}/composer.lock" \
            --exclude="./${APP_NAME}/composer.phar" \
            --exclude="./${APP_NAME}/yarn.lock" \
            --exclude="./${APP_NAME}/webpack.common.js" \
            --exclude="./${APP_NAME}/webpack.config.js" \
            --exclude="./${APP_NAME}/webpack.dev.js" \
            --exclude="./${APP_NAME}/webpack.prod.js" \
            --exclude="./${APP_NAME}/tsconfig.json" \
            --exclude="./${APP_NAME}/babel.config.js" \
            --exclude="./${APP_NAME}/stylelint.config.js" \
            --exclude="./${APP_NAME}/Makefile" \
            --exclude="./${APP_NAME}/psalm.xml" \
            --exclude="./${APP_NAME}/phpunit.xml" \
            --exclude="./${APP_NAME}/phpunit.integration.xml" \
            "./${APP_NAME}/"
          mkdir -p stage
          tar xzf clean.tar.gz -C stage

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype,curl,dom,gd,intl,json,mbstring,openssl,posix,xml,zip,bz2,fileinfo,gmp,bcmath
          coverage: none

      - name: Fetch Nextcloud server (provides occ)
        run: |
          curl -fsSL -o nextcloud.tar.bz2 \
            "https://download.nextcloud.com/server/releases/latest-${NEXTCLOUD_SERVER_MAJOR}.tar.bz2"
          tar xjf nextcloud.tar.bz2

      - name: Code-sign app
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -z "$APP_PRIVATE_KEY" ]; then
            echo "::error::APP_PRIVATE_KEY secret is not set."
            exit 1
          fi
          printf '%s\n' "$APP_PRIVATE_KEY" > private_key.pem
          curl -fsSL -o "${APP_NAME}.crt" \
            "https://raw.githubusercontent.com/nextcloud/app-certificate-requests/master/${APP_NAME}/${APP_NAME}.crt"
          php nextcloud/occ integrity:sign-app \
            --privateKey="${PWD}/private_key.pem" \
            --certificate="${PWD}/${APP_NAME}.crt" \
            --path="${PWD}/stage/${APP_NAME}"
          # sign the staged copy, then re-pack it unchanged so the signed and shipped files are identical
          tar czf "${APP_NAME}.tar.gz" -C stage "${APP_NAME}"
          rm -f private_key.pem

      - name: Verify tarball contents
        run: |
          if ! tar tzf "${APP_NAME}.tar.gz" | grep -q "^${APP_NAME}/appinfo/signature.json$"; then
            echo "::error::signature.json missing - code signing did not run correctly."
            exit 1
          fi
          FORBIDDEN=$(tar tzf "${APP_NAME}.tar.gz" | grep -E '(node_modules|\.git/|/src/|/tests/|/vendor/|package\.json|webpack\.|tsconfig|\.map$|\.LICENSE\.txt$)' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Tarball contains forbidden files:"
            echo "$FORBIDDEN"
            exit 1
          fi

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ env.APP_NAME }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Nextcloud App Store
        if: github.ref == 'refs/heads/main'
        uses: nextcloud-releases/nextcloud-appstore-push-action@a011fe619bcf6e77ddebc96f9908e1af4071b9c1 # v1.0.3
        with:
          app_name: ${{ env.APP_NAME }}
          appstore_token: ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}
          download_url: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ env.APP_NAME }}.tar.gz
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
