name: Release

on:
  push:
    tags:
      - '[0-9]*'

env:
  APP_NAME: sendentsynchroniser

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: ${{ env.APP_NAME }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${TAG}"

      - name: Validate info.xml version matches tag
        working-directory: ${{ env.APP_NAME }}
        run: |
          INFO_VERSION=$(grep -oP '<version>\K[^<]+' appinfo/info.xml)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "info.xml version: ${INFO_VERSION}"
          echo "Tag version:      ${TAG_VERSION}"
          if [ "${INFO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch! info.xml has '${INFO_VERSION}' but tag is '${TAG_VERSION}'"
            exit 1
          fi
          echo "Version match confirmed."

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_NAME }}/package-lock.json

      - name: Install npm dependencies
        working-directory: ${{ env.APP_NAME }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.APP_NAME }}
        run: npm run build

      - name: Clean build artifacts
        working-directory: ${{ env.APP_NAME }}
        run: |
          find js/ -name '*.map' -delete
          find js/ -name '*.LICENSE.txt' -delete
          find css/ -name '*.map' -delete 2>/dev/null || true

      - name: Create release tarball
        run: |
          tar czf sendentsynchroniser.tar.gz \
            --exclude='./${{ env.APP_NAME }}/.git' \
            --exclude='./${{ env.APP_NAME }}/.github' \
            --exclude='./${{ env.APP_NAME }}/.gitignore' \
            --exclude='./${{ env.APP_NAME }}/.eslintrc.*' \
            --exclude='./${{ env.APP_NAME }}/.php_cs*' \
            --exclude='./${{ env.APP_NAME }}/.php-cs-fixer.dist.php' \
            --exclude='./${{ env.APP_NAME }}/.phpunit.result.cache' \
            --exclude='./${{ env.APP_NAME }}/.env' \
            --exclude='./${{ env.APP_NAME }}/.vscode' \
            --exclude='./${{ env.APP_NAME }}/.vs' \
            --exclude='./${{ env.APP_NAME }}/.DS_Store' \
            --exclude='./${{ env.APP_NAME }}/.claude' \
            --exclude='./${{ env.APP_NAME }}/node_modules' \
            --exclude='./${{ env.APP_NAME }}/vendor' \
            --exclude='./${{ env.APP_NAME }}/src' \
            --exclude='./${{ env.APP_NAME }}/tests' \
            --exclude='./${{ env.APP_NAME }}/build' \
            --exclude='./${{ env.APP_NAME }}/releases' \
            --exclude='./${{ env.APP_NAME }}/certificates' \
            --exclude='./${{ env.APP_NAME }}/package.json' \
            --exclude='./${{ env.APP_NAME }}/package-lock.json' \
            --exclude='./${{ env.APP_NAME }}/composer.json' \
            --exclude='./${{ env.APP_NAME }}/composer.lock' \
            --exclude='./${{ env.APP_NAME }}/composer.phar' \
            --exclude='./${{ env.APP_NAME }}/yarn.lock' \
            --exclude='./${{ env.APP_NAME }}/webpack.common.js' \
            --exclude='./${{ env.APP_NAME }}/webpack.dev.js' \
            --exclude='./${{ env.APP_NAME }}/webpack.prod.js' \
            --exclude='./${{ env.APP_NAME }}/tsconfig.json' \
            --exclude='./${{ env.APP_NAME }}/Makefile' \
            --exclude='./${{ env.APP_NAME }}/psalm.xml' \
            --exclude='./${{ env.APP_NAME }}/phpunit.xml' \
            --exclude='./${{ env.APP_NAME }}/phpunit.integration.xml' \
            --exclude='./${{ env.APP_NAME }}/babel.config.js' \
            --exclude='./${{ env.APP_NAME }}/stylelint.config.js' \
            ./${{ env.APP_NAME }}/

      - name: Verify tarball contents
        run: |
          echo "=== Tarball top-level entries ==="
          tar tzf sendentsynchroniser.tar.gz | head -30
          echo ""
          echo "=== Checking for files that must NOT be present ==="
          FORBIDDEN=$(tar tzf sendentsynchroniser.tar.gz | grep -E '(node_modules|\.git/|/src/|/tests/|/vendor/|package\.json|webpack\.|tsconfig|\.map$|\.LICENSE\.txt$)' || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Tarball contains forbidden files:"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "Tarball verification passed."

      - name: Sign tarball with Nextcloud private key
        id: sign
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          echo "$APP_PRIVATE_KEY" > private_key.pem
          SIGNATURE=$(openssl dgst -sha512 -sign private_key.pem sendentsynchroniser.tar.gz | openssl base64 -A)
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"
          rm private_key.pem

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: sendentsynchroniser.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Nextcloud App Store
        env:
          NEXTCLOUD_APPSTORE_TOKEN: ${{ secrets.NEXTCLOUD_APPSTORE_TOKEN }}
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/sendentsynchroniser.tar.gz"
          SIGNATURE="${{ steps.sign.outputs.signature }}"

          echo "Publishing to Nextcloud App Store..."
          echo "Download URL: ${DOWNLOAD_URL}"

          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Token ${NEXTCLOUD_APPSTORE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"download\": \"${DOWNLOAD_URL}\", \"signature\": \"${SIGNATURE}\", \"nightly\": false}" \
            https://apps.nextcloud.com/api/v1/apps/releases)

          echo "HTTP Status: ${HTTP_STATUS}"
          cat response.txt
          echo ""

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::App Store publish failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          echo "Successfully published to Nextcloud App Store."
